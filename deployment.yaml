apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmconnect-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: farm
  template:
    metadata:
      labels:
        app: farm
    spec:
      containers:
      - name: backend
        image: farmconnect-backend
        imagePullPolicy: Never
        ports:
        - containerPort: 5000